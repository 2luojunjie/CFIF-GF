seed: 42
device: auto
output_dir: outputs
log_dir: logs

dataset:
  name: IEMOCAP
  root: data/IEMOCAP
  all_manifest: null
  train_manifest: null
  val_manifest: null
  test_manifest: null
  mock: true
  mock_num_samples: 32
  sample_rate: 16000
  duration_seconds: 3.0
  num_classes: 4
  label_names: [angry, happy, sad, neutral]
  preprocessing:
    n_mfcc: 40
    mfcc_window_ms: 40
    mfcc_hop_ms: 10
    spectrogram_n_fft: 800
    spectrogram_bins: 200
    spectrogram_hop_ms: 10
  loso:
    enabled: false
    expected_folds: 10

model:
  name: WavLM_Att
  wavlm_name: microsoft/wavlm-base
  freeze_wavlm: true
  use_offline_wavlm_features: false
  offline_wavlm_dim: 768
  mfcc_dim: 40
  mfcc_hidden_size: 256
  mfcc_num_layers: 1
  spectrogram_feature_dim: 512
  attention_dim: 256
  classifier_hidden_dim: 256
  dropout: 0.5
  num_classes: 4

train:
  epochs: 100
  batch_size: 4
  num_workers: 0
  learning_rate: 0.001
  weight_decay: 0.0
  optimizer: AdamW
  log_interval: 5
  log_backend: csv
  amp: false
  grad_clip_norm: 5.0
  early_stopping:
    monitor: wa
    patience: 10
    min_delta: 0.0
